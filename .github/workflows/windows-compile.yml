name: Windows Compile Check

on:
  pull_request:
  push:

jobs:
  windows-compile:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compile rogue_app
        run: cargo test -p rogue_app --features dev --no-run

